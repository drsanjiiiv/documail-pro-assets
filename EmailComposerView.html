<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link rel="stylesheet" href="https://ssl.gstatic.com/docs/script/css/add-ons1.css">
  
  <style>
    body { margin: 0; padding: 16px; font-family: 'Roboto', sans-serif; background-color: #f8f9fa; color: #3c4043; }
    
    .app-container { display: flex; gap: 16px; max-width: 960px; margin: 0 auto; background: #ffffff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    .form-pane { flex: 2; display: flex; flex-direction: column; gap: 10px; min-width: 0; }
    .tags-pane { flex: 1; background: #f1f3f4; padding: 14px; border-radius: 6px; border: 1px solid #dadce0; max-height: 560px; overflow-y: auto; }
    
    .title { font-size: 16px; font-weight: bold; color: #1a73e8; margin-bottom: 12px; border-bottom: 1px solid #e8eaed; padding-bottom: 6px; }
    .field-row { display: grid; grid-template-columns: 80px 1fr; align-items: center; gap: 8px; }
    label { font-weight: bold; font-size: 12px; color: #5f6368; }
    input[type="text"] { width: 100%; box-sizing: border-box; padding: 6px; border: 1px solid #dadce0; border-radius: 4px; font-size: 13px; }
    input[type="text"]:focus { border-color: #1a73e8; outline: none; }
    
    .editor-toolbar { display: flex; flex-wrap: wrap; background: #f1f3f4; border: 1px solid #dadce0; border-bottom: none; border-radius: 4px 4px 0 0; padding: 6px; gap: 6px; align-items: center; }
    .editor-btn { background: #ffffff; border: 1px solid #dadce0; border-radius: 3px; padding: 4px 8px; cursor: pointer; font-size: 12px; font-weight: bold; min-width: 28px; height: 26px; text-align: center; display: inline-flex; align-items: center; justify-content: center; outline: none; box-sizing: border-box; }
    .editor-btn:hover, .editor-btn:focus { background: #e8f0fe; border-color: #1a73e8; color: #1a73e8; outline: none; }
    
    .editor-select { background: #ffffff; border: 1px solid #dadce0; border-radius: 3px; padding: 4px; font-size: 12px; height: 26px; outline: none; -webkit-appearance: none; appearance: none; padding-right: 18px; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24"><path fill="none" d="M0 0h24v24H0z"/><path d="M7 10l5 5 5-5z"/></svg>'); background-repeat: no-repeat; background-position: right 4px center; }
    .editor-select:hover, .editor-select:focus { background-color: #e8f0fe; border-color: #1a73e8; outline: none; }
    
    .color-wrapper { display: inline-flex; align-items: center; position: relative; cursor: pointer; background: #ffffff; border: 1px solid #dadce0; border-radius: 3px; padding: 2px 4px; height: 26px; box-sizing: border-box; outline: none; }
    .color-wrapper:hover { border-color: #1a73e8; background: #e8f0fe; }
    .color-wrapper input[type="color"] { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
    .color-label { font-size: 13px; font-weight: bold; padding: 0 4px; display: inline-block; }
    
    .editor-canvas { width: 100%; box-sizing: border-box; height: 200px; border: 1px solid #dadce0; border-radius: 0 0 4px 4px; padding: 10px; background: #ffffff; overflow-y: auto; font-size: 13px; line-height: 1.5; }
    .editor-canvas:focus { border-color: #1a73e8; outline: none; }
    
    .tag-section-title { font-size: 11px; font-weight: bold; color: #70757a; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; }
    .tag-btn { display: block; width: 100%; text-align: left; padding: 6px 10px; margin-bottom: 6px; background: #ffffff; border: 1px solid #dadce0; border-radius: 4px; font-size: 11px; cursor: pointer; font-family: monospace; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; outline: none; }
    .tag-btn:hover { background: #e8f0fe; border-color: #1a73e8; color: #1a73e8; }
    
    .attachment-box { border: 1px dashed #dadce0; padding: 10px; border-radius: 4px; background: #f8f9fa; font-size: 11px; display: flex; flex-direction: column; gap: 6px; }
    .attachment-list { margin: 0; padding-left: 16px; font-size: 11px; color: #137333; }
    
    .btn-link-drive { background: #1a73e8 !important; color: #ffffff !important; border: 1px solid #155cb4 !important; border-radius: 4px; font-weight: bold; cursor: pointer; }
    .btn-link-drive:hover { background: #155cb4 !important; }
    .btn-browse-local { background: #137333 !important; color: #ffffff !important; border: 1px solid #0f5d29 !important; border-radius: 4px; font-weight: bold; cursor: pointer; }
    .btn-browse-local:hover { background: #0f5d29 !important; }
    
    .actions-bar { display: flex; justify-content: flex-end; gap: 12px; margin-top: 14px; border-top: 1px solid #e8eaed; padding-top: 10px; }
    .btn-cancel { background: #ffffff !important; color: #3c4043 !important; border: 1px solid #dadce0 !important; border-radius: 4px; padding: 0 16px; height: 36px; cursor: pointer; }
    .btn-cancel:hover { background: #f1f3f4 !important; }
    .btn-submit { background: #137333 !important; color: #ffffff !important; border: 1px solid #0f5d29 !important; border-radius: 4px; padding: 0 20px; height: 36px; font-weight: bold; cursor: pointer; }
    .btn-submit:hover { background: #0f5d29 !important; }
  </style>
</head>
<body>

  <div class="title">Build / Preview Email Templates</div>
  
  <div class="app-container">
    <div class="form-pane">
      <div class="field-row">
        <label>To:</label>
        <input type="text" id="emailTo" value="{{Recipient Email}}" disabled style="background:#f1f3f4; font-weight:bold; color:#137333;">
      </div>

      <div class="field-row">
        <label>Reply-To:</label>
        <input type="text" id="emailReplyTo" placeholder="no-reply@domain.com">
      </div>

      <div class="field-row">
        <label>CC / BCC:</label>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 8px;">
          <input type="text" id="emailCc" placeholder="CC: team@domain.com">
          <input type="text" id="emailBcc" placeholder="BCC: archive@domain.com">
        </div>
      </div>

      <div class="field-row">
        <label>Subject:*</label>
        <input type="text" id="emailSubject" value="Notification Template">
      </div>

      <div style="display:flex; flex-direction:column;">
        <label style="margin-bottom:4px;">Email Body Template:</label>
        
        <div class="editor-toolbar">
          <select class="editor-select" onchange="runStyleCommand('fontName', this.value)">
            <option value="Arial">Arial</option>
            <option value="Times New Roman">Times New Roman</option>
            <option value="Courier New">Courier New</option>
            <option value="Verdana">Verdana</option>
          </select>
          
          <select class="editor-select" onchange="runStyleCommand('fontSize', this.value)">
            <option value="3">Normal</option>
            <option value="1">Small</option>
            <option value="4">Large</option>
            <option value="5">Huge</option>
          </select>
          
          <button type="button" class="editor-btn" onclick="runStyleCommand('bold')">B</button>
          <button type="button" class="editor-btn" onclick="runStyleCommand('italic')" style="font-style:italic;">I</button>
          <button type="button" class="editor-btn" onclick="runStyleCommand('underline')" style="text-decoration:underline;">U</button>
          
          <div class="color-wrapper" title="Text Color">
            <span class="color-label" style="border-bottom: 3px solid #000000; line-height:10px;">A</span>
            <input type="color" onchange="runStyleCommand('foreColor', this.value)" value="#000000">
          </div>
          
          <div class="color-wrapper" title="Highlight Color">
            <span class="color-label" style="font-size:11px;">🖌️</span>
            <input type="color" onchange="runStyleCommand('hiliteColor', this.value)" value="#ffffff">
          </div>
          
          <span style="color:#dadce0;">|</span>
          
          <button type="button" class="editor-btn" id="cyclingAlignBtn" onclick="cycleTextAlignmentState()" title="Align Left / Center / Right" style="font-size:16px;">≡</button>
          
          <span style="color:#dadce0;">|</span>
          
          <button type="button" class="editor-btn" onclick="runStyleCommand('insertOrderedList')" title="Numbered List">1=</button>
          <button type="button" class="editor-btn" onclick="runStyleCommand('insertUnorderedList')" title="Bulleted List">•=</button>
          
          <span style="color:#dadce0;">|</span>
          <button type="button" class="editor-btn" onclick="insertHyperlinkWindow()" title="Insert Link">🔗</button>
        </div>
        
        <div id="emailBodyCanvas" class="editor-canvas" contenteditable="true"></div>
      </div>

      <div class="attachment-box">
        <div style="display:flex; gap:10px;">
          <button class="btn-link-drive" type="button" onclick="addDriveFileLink()" style="font-size:11px; padding:6px 12px;">📎 LINK DRIVE FILE</button>
          <button class="btn-browse-local" type="button" onclick="document.getElementById('localFileInput').click()" style="font-size:11px; padding:6px 12px;">📁 BROWSE LOCAL FILE</button>
          <input type="file" id="localFileInput" style="display:none;" onchange="handleLocalFileUploadStream(this)">
        </div>
        <div>
          <ul id="filesTrackRecordList" class="attachment-list"></ul>
        </div>
      </div>
    </div>

    <div class="tags-pane">
      <div class="tag-section-title" id="tagSectionTitle">Available Tags (Click to Inject)</div>
      <div id="dynamicTagsContainer">
        <p style="font-size:11px; color:#5f6368; font-style:italic;">Querying sheet column tags...</p>
      </div>
    </div>
  </div>

  <div class="actions-bar">
    <button type="button" class="btn-cancel" onclick="closeModalWindow()">Cancel</button>
    <button type="button" class="btn-submit" onclick="saveAndGoToPreviewGrid()">Save & Preview ➡</button>
  </div>

  <script>
    let activeDriveLinksCache = [];
    let activeLocalFilesCache = [];
    let activeFocusTargetInputId = "emailBodyCanvas";
    
    let alignmentIndexState = 0;
    const alignmentCycles = [
      { cmd: 'justifyLeft', tip: 'Align Left' },
      { cmd: 'justifyCenter', tip: 'Align Center' },
      { cmd: 'justifyRight', tip: 'Align Right' }
    ];

    document.getElementById("emailReplyTo").addEventListener("focus", function() { activeFocusTargetInputId = "emailReplyTo"; });
    document.getElementById("emailSubject").addEventListener("focus", function() { activeFocusTargetInputId = "emailSubject"; });
    document.getElementById("emailCc").addEventListener("focus", function() { activeFocusTargetInputId = "emailCc"; });
    document.getElementById("emailBcc").addEventListener("focus", function() { activeFocusTargetInputId = "emailBcc"; });
    document.getElementById("emailBodyCanvas").addEventListener("focus", function() { activeFocusTargetInputId = "emailBodyCanvas"; });

    function runStyleCommand(command, value) {
      document.execCommand(command, false, value);
      document.getElementById("emailBodyCanvas").focus();
    }

    function cycleTextAlignmentState() {
      alignmentIndexState = (alignmentIndexState + 1) % alignmentCycles.length;
      var activeState = alignmentCycles[alignmentIndexState];
      runStyleCommand(activeState.cmd);
      document.getElementById("cyclingAlignBtn").setAttribute("title", activeState.tip);
    }

    function insertHyperlinkWindow() {
      var userUrl = prompt("Enter URL link target destination:");
      if(userUrl) runStyleCommand('createLink', userUrl);
    }

    function injectTag(headerName) {
      var tagToken = "{" + headerName.replace(/[\[\]]/g, "").trim() + "}";
      if (activeFocusTargetInputId === "emailBodyCanvas") {
        document.getElementById("emailBodyCanvas").focus();
        var textSelection = window.getSelection();
        if (!textSelection.rangeCount) return;
        var range = textSelection.getRangeAt(0);
        range.deleteContents();
        range.insertNode(document.createTextNode(tagToken));
      } else {
        var inputField = document.getElementById(activeFocusTargetInputId);
        var cursorStart = inputField.selectionStart;
        var cursorEnd = inputField.selectionEnd;
        inputField.value = inputField.value.substring(0, cursorStart) + tagToken + inputField.value.substring(cursorEnd);
        inputField.focus();
        inputField.selectionStart = inputField.selectionEnd = cursorStart + tagToken.length;
      }
    }

    function addDriveFileLink() {
      var urlPrompt = prompt("Enter Google Drive Shared File URL to attach:");
      if (urlPrompt && urlPrompt.trim() !== "") {
        activeDriveLinksCache.push(urlPrompt.trim());
        renderAttachmentElementsTrackerList();
      }
    }

    function handleLocalFileUploadStream(inputElement) {
      var selectedFile = inputElement.files[0];
      if (!selectedFile) return;
      if (selectedFile.size > 5 * 1024 * 1024) {
        alert("❌ Hardware Size Exception: File exceeds 5MB limit.");
        return;
      }
      document.getElementById("tagSectionTitle").innerText = "⏳ UPLOADING...";
      var fileReaderInstance = new FileReader();
      fileReaderInstance.onload = function(event) {
        google.script.run
          .withSuccessHandler(function(uploadResult) {
            document.getElementById("tagSectionTitle").innerText = "Available Tags (Click to Inject)";
            if (uploadResult.success) {
              activeLocalFilesCache.push({ id: uploadResult.id, name: uploadResult.name });
              renderAttachmentElementsTrackerList();
            }
          })
          .UPLOAD_LOCAL_FILE_STREAM({ name: selectedFile.name, mimeType: selectedFile.type, data: event.target.result });
      };
      fileReaderInstance.readAsDataURL(selectedFile);
    }

    function renderAttachmentElementsTrackerList() {
      var listUl = document.getElementById("filesTrackRecordList");
      listUl.innerHTML = "";
      activeDriveLinksCache.forEach(function(url) {
        var li = document.createElement("li"); li.innerText = "☁️ Drive File: ..." + url.substring(url.length - 15); listUl.appendChild(li);
      });
      activeLocalFilesCache.forEach(function(fileObj) {
        var li = document.createElement("li"); li.innerText = "💻 Local File: " + fileObj.name; listUl.appendChild(li);
      });
    }

    window.onload = function() {
      google.script.run
        .withSuccessHandler(function(liveHeadersArray) {
          var tagsContainer = document.getElementById("dynamicTagsContainer");
          tagsContainer.innerHTML = "";
          liveHeadersArray.forEach(function(headerName) {
            if (headerName && headerName.trim() !== "") {
              var cleanLabel = headerName.split('[')[0].trim();
              var btn = document.createElement("button");
              btn.className = "tag-btn"; btn.type = "button"; btn.innerText = cleanLabel;
              btn.onclick = function() { injectTag(cleanLabel); };
              tagsContainer.appendChild(btn);
            }
          });
          
          google.script.run
            .withSuccessHandler(function(currentConfig) {
              if (currentConfig) {
                document.getElementById("emailReplyTo").value = currentConfig.replyTo || "";
                document.getElementById("emailCc").value = currentConfig.cc || "";
                document.getElementById("emailBcc").value = currentConfig.bcc || "";
                document.getElementById("emailSubject").value = currentConfig.subject || "";
                document.getElementById("emailBodyCanvas").innerHTML = currentConfig.body || "";
                activeDriveLinksCache = currentConfig.driveAttachments || [];
                activeLocalFilesCache = currentConfig.localAttachments || [];
                renderAttachmentElementsTrackerList();
              }
            })
            .GET_STORED_TEMPLATE_STATE();
        })
        .GET_LIVE_SHEET_HEADERS();
      
      // Check for pending attachments from document merge
      google.script.run
        .withSuccessHandler(function(attachments) {
          if (attachments && attachments.length > 0) {
            attachments.forEach(function(file) {
              activeDriveLinksCache.push(file.url);
            });
            renderAttachmentElementsTrackerList();
            var notification = document.createElement('div');
            notification.style.cssText = 'background:#e8f0fe; color:#1a73e8; padding:8px; margin-bottom:10px; border-radius:4px; font-size:12px;';
            notification.innerHTML = '📎 ' + attachments.length + ' PDF file(s) auto-attached from document generation!';
            document.querySelector('.form-pane').insertBefore(notification, document.querySelector('.form-pane').firstChild);
            setTimeout(function() { notification.remove(); }, 5000);
          }
        })
        .GET_PENDING_EMAIL_ATTACHMENTS();
    };

    function saveAndGoToPreviewGrid() {
      const configPayload = {
        isSaved: true,
        replyTo: document.getElementById("emailReplyTo").value,
        cc: document.getElementById("emailCc").value,
        bcc: document.getElementById("emailBcc").value,
        subject: document.getElementById("emailSubject").value,
        body: document.getElementById("emailBodyCanvas").innerHTML,
        driveAttachments: activeDriveLinksCache,
        localAttachments: activeLocalFilesCache
      };

      google.script.run
        .withSuccessHandler(function() {
          google.script.run.OPEN_RECORDS_PREVIEW_WINDOW();
        })
        .SAVE_TEMPLATE_STATE(configPayload);
    }

    function closeModalWindow() { google.script.host.close(); }
  </script>
</body>
</html>
